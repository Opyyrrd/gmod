<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IcyUniverse | Neural Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #00a0ff;
            --deep-cyan: #00ffd5;
            --bg-dark: #020406;
            --panel-bg: rgba(5, 10, 20, 0.85);
            --glass-border: rgba(0, 160, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg-dark);
            font-family: 'Roboto Mono', monospace;
            color: white;
            overflow: hidden;
            user-select: none;
        }

        /* --- Global FX --- */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10; background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #bg-container { position: fixed; width: 100%; height: 100%; z-index: 0; }
        .bg-slide {
            position: absolute; width: 110%; height: 110%;
            background-size: cover; background-position: center;
            filter: brightness(0.4) blur(2px);
            opacity: 0; transition: opacity 2s ease-in-out;
            animation: pan 30s infinite alternate linear;
        }
        .bg-slide.active { opacity: 1; }

        @keyframes pan {
            from { transform: scale(1.0); translate: 0% 0%; }
            to { transform: scale(1.1); translate: -2% -2%; }
        }

        .top-bar {
            position: absolute; top: 40px; left: 40px;
            display: flex; align-items: center; z-index: 15;
            background: var(--panel-bg);
            padding: 12px 25px 12px 12px;
            border-left: 4px solid var(--main-blue);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .avatar-wrapper { position: relative; width: 60px; height: 60px; background: #000; overflow: hidden; }
        #avatar {
            width: 100%; height: 100%; 
            border: 1px solid var(--glass-border);
            object-fit: cover;
            opacity: 0.5;
            transition: opacity 0.5s ease;
        }
        
        #avatar.scanning {
            filter: brightness(0.5) sepia(1) hue-rotate(180deg);
            animation: avatarPulse 1.5s infinite;
        }

        .avatar-frame {
            position: absolute; top: -5px; left: -5px; width: 70px; height: 70px;
            border: 1px solid var(--main-blue); opacity: 0.5;
            z-index: 16; pointer-events: none;
            animation: pulse 2s infinite;
        }

        .user-meta { margin-left: 20px; }
        .user-meta h2 { margin: 0; font-family: 'Orbitron'; font-size: 16px; color: white; letter-spacing: 2px; text-transform: uppercase; }
        .user-meta small { color: var(--main-blue); font-weight: bold; font-size: 11px; display: block; margin-top: 4px; }

        .center-brand {
            position: absolute; top: 45%; left: 50%;
            transform: translate(-50%, -50%); text-align: center; z-index: 5;
        }
        .server-title {
            font-family: 'Orbitron'; font-size: 110px; font-weight: 900;
            letter-spacing: 35px; margin: 0;
            background: linear-gradient(to bottom, #fff 40%, var(--main-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 160, 255, 0.5));
        }

        .bottom-area {
            position: absolute; bottom: 80px; left: 50%;
            transform: translateX(-50%); width: 40%; z-index: 20;
        }
        .loading-stats {
            display: flex; justify-content: space-between;
            font-size: 10px; color: var(--main-blue);
            margin-bottom: 10px; font-weight: bold; letter-spacing: 2px;
        }
        .progress-rail {
            width: 100%; height: 2px; background: rgba(255,255,255,0.05);
            position: relative;
        }
        #progress-bar {
            width: 0%; height: 100%; background: var(--main-blue);
            box-shadow: 0 0 15px var(--main-blue); transition: width 0.4s ease;
        }

        .side-info {
            position: absolute; left: 40px; bottom: 80px;
            border-left: 1px solid var(--main-blue); padding-left: 15px;
            font-size: 11px; color: rgba(255,255,255,0.4);
        }
        .side-info span { color: var(--deep-cyan); display: block; margin-bottom: 5px; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        @keyframes avatarPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div id="bg-container">
        <div class="bg-slide active" style="background-image: url('https://i.imgur.com/Oo059b7.jpeg');"></div>
    </div>

    <div class="top-bar">
        <div class="avatar-wrapper">
            <div class="avatar-frame"></div>
            <img id="avatar" class="scanning" src="https://i.imgur.com/6E7p7vC.png">
        </div>
        <div class="user-meta">
            <small id="auth-tag">ESTABLISHING LINK...</small>
            <h2 id="username">SCANNING USER</h2>
            <small id="steamid">ID: SEARCHING...</small>
        </div>
    </div>

    <div class="center-brand">
        <h1 class="server-title">ICYUNIVERSE</h1>
        <p style="letter-spacing: 15px; font-size: 11px; color: var(--main-blue); opacity: 0.7;">CYBERNETIC ROLEPLAY EXPERIENCE</p>
    </div>

    <div class="side-info">
        <span>MAP: <b id="mapname">SEARCHING...</b></span>
        <span>SECTOR: <b>US-CENTRAL-1</b></span>
        <span>STATUS: <b id="status-update">INITIALIZING</b></span>
    </div>

    <div class="bottom-area">
        <div class="loading-stats">
            <div id="tip-text">SYNCING DATA BLOCKS...</div>
            <div id="percent-text">0%</div>
        </div>
        <div class="progress-rail">
            <div id="progress-bar"></div>
        </div>
    </div>

    <audio id="loading-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- HELPERS ---
        // GMod passes variables via URL (e.g., ?steamid=123&mapname=gm_flatgrass)
        // This function ensures data shows even if the engine hook misses.
        function getQueryVariable(variable) {
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i=0; i<vars.length; i++) {
                var pair = vars[i].split("=");
                if(pair[0] == variable){ return pair[1]; }
            }
            return(false);
        }

        // --- GMOD ENGINE HOOKS ---

        function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume) {
            if (mapname) document.getElementById('mapname').innerText = mapname.toUpperCase();
            if (steamid && steamid !== "0") document.getElementById('steamid').innerText = "ID: " + steamid;
            
            let music = document.getElementById('loading-music');
            music.volume = 0.2;
            music.play().catch(e => console.log("Audio waiting"));
        }

        function SetPlayerEntityInfo(name, steamid, communityid, avatarurl) {
            updatePlayerUI(name, steamid, avatarurl);
        }

        function updatePlayerUI(name, steamid, avatarurl) {
            if (name && name !== "undefined") {
                document.getElementById('username').innerText = decodeURIComponent(name).toUpperCase();
                document.getElementById('auth-tag').innerText = "SUBJECT_IDENTIFIED";
            }
            if (steamid && steamid !== "0") {
                document.getElementById('steamid').innerText = "ID: " + steamid;
            }
            if (avatarurl && avatarurl !== "" && avatarurl !== "noimage") {
                const img = document.getElementById('avatar');
                img.src = avatarurl;
                img.onload = function() {
                    img.classList.remove('scanning');
                    img.style.opacity = "1";
                    img.style.filter = "none";
                };
            }
        }

        // --- INITIALIZATION ---
        // Run immediately to catch URL parameters as a fallback
        window.onload = function() {
            var urlName = getQueryVariable("name"); // Some servers pass ?name=
            var urlID = getQueryVariable("steamid");
            if(urlName || urlID) {
                updatePlayerUI(urlName, urlID, null);
            }
        };

        let totalFiles = 0;
        function SetFilesTotal(total) { totalFiles = total; }
        function SetFilesNeeded(needed) {
            let downloaded = Math.max(0, totalFiles - needed);
            let percentage = (totalFiles > 0) ? Math.floor((downloaded / totalFiles) * 100) : 0;
            document.getElementById('progress-bar').style.width = percentage + "%";
            document.getElementById('percent-text').innerText = percentage + "%";
        }
        function SetStatusChanged(status) {
            document.getElementById('status-update').innerText = status.toUpperCase();
            let displayStatus = status.replace(/Downloading|Extracting/gi, "").trim();
            document.getElementById('tip-text').innerText = displayStatus || "PROCESSING...";
        }
    </script>
</body>
</html>
